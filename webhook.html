<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook消息发送器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#475569',
                        accent: '#f59e0b',
                        success: '#10b981',
                        danger: '#ef4444',
                        light: '#f8fafc',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .tab-active {
                @apply border-primary text-primary bg-primary/5;
            }
            .input-focus {
                @apply focus:ring-2 focus:ring-primary/50 focus:border-primary focus:outline-none;
            }
            .btn-hover {
                @apply hover:shadow-lg transition-all duration-200;
            }
            .attachment-item {
                @apply relative w-20 h-20 rounded-lg overflow-hidden border-2 border-dashed border-gray-300 hover:border-primary/70 transition-colors;
            }
            .attachment-preview {
                @apply absolute inset-0 w-full h-full object-cover;
            }
            .attachment-remove {
                @apply absolute -top-2 -right-2 w-6 h-6 rounded-full bg-danger text-white flex items-center justify-center cursor-pointer opacity-0 hover:opacity-100 transition-opacity;
            }
            .attachment-item:hover .attachment-remove {
                opacity: 1;
            }
        }
    </style>
</head>
<body class="font-inter bg-gray-50 min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center">
                    <i class="fa fa-paper-plane text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800">Webhook 消息发送器</h1>
            </div>
            <div class="flex items-center space-x-3">
                <button id="addWebhookBtn" class="flex items-center space-x-1 px-3 py-2 bg-primary text-white rounded-lg btn-hover">
                    <i class="fa fa-plus text-sm"></i>
                    <span>添加 Webhook</span>
                </button>
            </div>
        </div>
    </header>
    <!-- 主要内容区域 -->
    <main class="flex-1 container mx-auto px-4 py-6">
        <!-- Webhook 标签栏 -->
        <div class="mb-6">
            <div class="flex items-center space-x-2 overflow-x-auto pb-2 scrollbar-hide">
                <div id="webhookTabs" class="flex space-x-1">
                    <!-- 标签将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
        <!-- 消息发送区域 -->
        <div id="messageArea" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hidden">
            <div class="mb-6 flex gap-4">
                <!-- 发送选项：纵向排列在左侧，缩小尺寸 -->
                <div class="p-3 bg-gray-50 rounded-lg w-44 flex-shrink-0">
                    <h4 class="text-xs font-medium text-gray-700 mb-2">发送选项</h4>
                    <div class="grid grid-cols-1 gap-2.5">
                        <div>
                            <label class="block text-[10px] font-medium text-gray-600 mb-0.5">发送格式</label>
                            <select id="sendFormat" class="w-full px-2 py-1 border border-gray-300 rounded-lg input-focus text-xs">
                                <option value="auto">自动检测</option>
                                <option value="json">JSON格式</option>
                                <option value="form">表单格式</option>
                                <option value="urlencoded">URL编码</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-medium text-gray-600 mb-0.5">图片处理</label>
                            <select id="imageOption" class="w-full px-2 py-1 border border-gray-300 rounded-lg input-focus text-xs">
                                <option value="compress">自动压缩</option>
                                <option value="original">保持原图</option>
                                <option value="link">仅发送链接</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-medium text-gray-600 mb-0.5">超时设置</label>
                            <select id="timeoutOption" class="w-full px-2 py-1 border border-gray-300 rounded-lg input-focus text-xs">
                                <option value="10000">10秒</option>
                                <option value="5000">5秒</option>
                                <option value="30000">30秒</option>
                            </select>
                        </div>
                    </div>
                </div>
                <!-- 预设消息区域 -->
                <div class="flex-1 p-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center justify-between mb-2">
                        <h4 class="text-xs font-medium text-gray-700">预设消息</h4>
                        <button id="addPresetBtn" class="text-xs px-2 py-1 bg-primary text-white rounded btn-hover flex items-center gap-1">
                            <i class="fa fa-plus text-xs"></i> 添加预设
                        </button>
                    </div>
                    <div id="presetButtonsContainer" class="flex flex-wrap gap-2">
                        <!-- 预设消息按钮将动态生成 -->
                        <span class="text-xs text-gray-400">暂无预设消息，点击添加按钮创建</span>
                    </div>
                </div>
            </div>
            <div class="mb-4">
                <label for="messageInput" class="block text-sm font-medium text-gray-700 mb-2">消息内容</label>
                <div class="relative">
                    <textarea 
                        id="messageInput" 
                        class="w-full min-h-[150px] px-4 py-3 border border-gray-300 rounded-lg input-focus resize-none transition-all"
                        placeholder="请输入要发送的消息内容..."
                        rows="4"
                    ></textarea>
                    <div class="absolute bottom-3 right-3 text-sm text-gray-400">
                        <span id="charCount">0</span> / 2000
                    </div>
                </div>
            </div>
            <!-- 附件区域 -->
            <div class="mb-6">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-medium text-gray-700">附件</label>
                    <span id="attachmentCount" class="text-xs text-gray-500">0张图片</span>
                </div>
                <div class="flex items-start space-x-3">
                    <div id="attachmentsContainer" class="flex flex-wrap gap-3">
                        <!-- 附件将通过JavaScript动态生成 -->
                    </div>
                    <div id="addAttachmentBtn" class="attachment-item flex items-center justify-center cursor-pointer">
                        <div class="text-center">
                            <i class="fa fa-image text-gray-400 text-xl mb-1"></i>
                            <span class="text-xs text-gray-500">添加图片</span>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
                    </div>
                </div>
                <p class="text-xs text-gray-500 mt-2">支持拖拽图片、粘贴剪贴板图片或点击添加图片</p>
            </div>
            <!-- 发送按钮 -->
            <div class="flex justify-between items-center">
                <div class="text-xs text-gray-500">
                    <span id="totalSize">总大小: 0KB</span>
                </div>
                <div class="flex space-x-3">
                    <button id="clearBtn" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 btn-hover">
                        <i class="fa fa-times mr-1"></i> 清空
                    </button>
                    <button id="debugBtn" class="px-4 py-2 border border-accent rounded-lg text-accent hover:bg-accent/5 btn-hover">
                        <i class="fa fa-bug mr-1"></i> 调试
                    </button>
                    <button id="sendBtn" class="px-6 py-2 bg-primary text-white rounded-lg btn-hover flex items-center space-x-2">
                        <i class="fa fa-paper-plane"></i>
                        <span>发送消息</span>
                    </button>
                </div>
            </div>
        </div>
        <!-- 空状态提示 -->
        <div id="emptyState" class="text-center py-20">
            <div class="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-4">
                <i class="fa fa-link text-gray-400 text-3xl"></i>
            </div>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">还没有添加任何 Webhook</h3>
            <p class="text-gray-500 mb-6">点击右上角的"添加 Webhook"按钮开始使用</p>
            <button id="emptyAddBtn" class="px-4 py-2 bg-primary text-white rounded-lg btn-hover">
                <i class="fa fa-plus mr-1"></i> 添加第一个 Webhook
            </button>
        </div>
    </main>
    <!-- 调试模态框 -->
    <div id="debugModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-4xl mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-gray-800">调试信息</h3>
                    <button id="closeDebugModalBtn" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <i class="fa fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            <div class="p-6 space-y-6">
                <div>
                    <h4 class="text-sm font-medium text-gray-700 mb-2">请求信息</h4>
                    <div id="requestInfo" class="bg-gray-50 p-4 rounded-lg text-sm font-mono overflow-x-auto"></div>
                </div>
                <div>
                    <h4 class="text-sm font-medium text-gray-700 mb-2">响应信息</h4>
                    <div id="responseInfo" class="bg-gray-50 p-4 rounded-lg text-sm font-mono overflow-x-auto"></div>
                </div>
                <div>
                    <h4 class="text-sm font-medium text-gray-700 mb-2">错误详情</h4>
                    <div id="errorInfo" class="bg-gray-50 p-4 rounded-lg text-sm font-mono overflow-x-auto"></div>
                </div>
            </div>
            <div class="p-6 border-t border-gray-200 flex justify-end">
                <button id="copyDebugBtn" class="px-4 py-2 bg-primary text-white rounded-lg btn-hover">
                    <i class="fa fa-copy mr-1"></i> 复制调试信息
                </button>
            </div>
        </div>
    </div>
    <!-- 添加 Webhook 模态框 -->
    <div id="addWebhookModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 transform transition-all scale-95 opacity-0" id="modalContent">
            <div class="p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold text-gray-800">添加 Webhook</h3>
                    <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <i class="fa fa-times text-xl"></i>
                    </button>
                </div>
                
                <form id="webhookForm" class="space-y-4">
                    <div>
                        <label for="webhookAlias" class="block text-sm font-medium text-gray-700 mb-1">别名</label>
                        <input 
                            type="text" 
                            id="webhookAlias" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg input-focus"
                            placeholder="例如：通知系统、日志服务"
                            required
                        >
                    </div>
                    
                    <div>
                        <label for="webhookUrl" class="block text-sm font-medium text-gray-700 mb-1">Webhook 地址</label>
                        <input 
                            type="url" 
                            id="webhookUrl" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg input-focus"
                            placeholder="https://example.com/webhook"
                            required
                        >
                    </div>
                    
                    <div class="flex space-x-3 pt-2">
                        <button type="button" id="cancelModalBtn" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 btn-hover">
                            取消
                        </button>
                        <button type="submit" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg btn-hover">
                            保存
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- 添加预设消息模态框 -->
    <div id="addPresetModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 transform transition-all scale-95 opacity-0" id="presetModalContent">
            <div class="p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold text-gray-800">添加预设消息</h3>
                    <button id="closePresetModalBtn" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <i class="fa fa-times text-xl"></i>
                    </button>
                </div>
                
                <form id="presetForm" class="space-y-4">
                    <div>
                        <label for="presetAlias" class="block text-sm font-medium text-gray-700 mb-1">别名</label>
                        <input 
                            type="text" 
                            id="presetAlias" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg input-focus"
                            placeholder="例如：上线通知、报错提醒"
                            required
                        >
                    </div>
                    
                    <div>
                        <label for="presetMessage" class="block text-sm font-medium text-gray-700 mb-1">消息内容</label>
                        <textarea 
                            id="presetMessage" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg input-focus min-h-[100px]"
                            placeholder="请输入预设的消息内容..."
                            required
                        ></textarea>
                    </div>
                    
                    <div class="flex space-x-3 pt-2">
                        <button type="button" id="cancelPresetModalBtn" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 btn-hover">
                            取消
                        </button>
                        <button type="submit" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg btn-hover">
                            保存
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- 成功提示 -->
    <div id="successToast" class="fixed bottom-4 right-4 bg-success text-white px-4 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 flex items-center space-x-2 z-50">
        <i class="fa fa-check-circle"></i>
        <span id="successMessage">消息发送成功！</span>
    </div>
    <!-- 错误提示 -->
    <div id="errorToast" class="fixed bottom-4 right-4 bg-danger text-white px-4 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 flex items-center space-x-2 z-50">
        <i class="fa fa-exclamation-circle"></i>
        <span id="errorMessage">发送失败，请重试</span>
    </div>
    <script>
        class WebhookSender {
            constructor() {
                this.webhooks = JSON.parse(localStorage.getItem('webhooks') || '[]');
                this.presets = JSON.parse(localStorage.getItem('presetMessages') || '[]');
                this.currentWebhook = null;
                this.attachments = [];
                
                this.init();
            }
            init() {
                this.bindEvents();
                this.renderWebhookTabs();
                this.renderPresetButtons();
                this.checkEmptyState();
                this.updateAttachmentStats();
                this.updateSendOptions();
                
                // 如果有保存的webhook，默认选中第一个
                if (this.webhooks.length > 0) {
                    this.selectWebhook(this.webhooks[0].id);
                }
            }
            bindEvents() {
                // 模态框相关
                document.getElementById('addWebhookBtn').addEventListener('click', () => this.openModal());
                document.getElementById('emptyAddBtn').addEventListener('click', () => this.openModal());
                document.getElementById('closeModalBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('cancelModalBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('webhookForm').addEventListener('submit', (e) => this.saveWebhook(e));
                // 调试模态框相关
                document.getElementById('debugBtn').addEventListener('click', () => this.openDebugModal());
                document.getElementById('closeDebugModalBtn').addEventListener('click', () => this.closeDebugModal());
                document.getElementById('copyDebugBtn').addEventListener('click', () => this.copyDebugInfo());
                // 表单相关
                document.getElementById('messageInput').addEventListener('input', () => this.updateCharCount());
                document.getElementById('messageInput').addEventListener('paste', (e) => this.handlePaste(e));
                
                // 附件相关
                document.getElementById('addAttachmentBtn').addEventListener('click', () => document.getElementById('fileInput').click());
                document.getElementById('fileInput').addEventListener('change', (e) => this.handleFileSelect(e));
                
                // 发送按钮
                document.getElementById('sendBtn').addEventListener('click', () => this.sendMessage());
                document.getElementById('clearBtn').addEventListener('click', () => this.clearForm());
                
                // 拖拽功能
                const messageArea = document.getElementById('messageArea');
                messageArea.addEventListener('dragover', (e) => this.handleDragOver(e));
                messageArea.addEventListener('drop', (e) => this.handleDrop(e));
                messageArea.addEventListener('dragleave', () => this.handleDragLeave());
                
                // 预设消息相关
                document.getElementById('addPresetBtn').addEventListener('click', () => this.openPresetModal());
                document.getElementById('closePresetModalBtn').addEventListener('click', () => this.closePresetModal());
                document.getElementById('cancelPresetModalBtn').addEventListener('click', () => this.closePresetModal());
                document.getElementById('presetForm').addEventListener('submit', (e) => this.savePreset(e));
                
                // 发送选项变化
                document.getElementById('sendFormat').addEventListener('change', () => this.updateSendOptions());
                document.getElementById('imageOption').addEventListener('change', () => this.updateSendOptions());
            }
            // 更新附件统计信息
            updateAttachmentStats() {
                const attachmentCount = document.getElementById('attachmentCount');
                const totalSize = document.getElementById('totalSize');
                
                const count = this.attachments.length;
                const size = this.attachments.reduce((sum, att) => sum + att.size, 0);
                
                attachmentCount.textContent = `${count}张图片`;
                totalSize.textContent = `总大小: ${(size / 1024).toFixed(1)}KB`;
            }
            // 更新发送选项
            updateSendOptions() {
                const format = document.getElementById('sendFormat').value;
                const imageOption = document.getElementById('imageOption').value;
                
                // 根据选择的格式显示/隐藏相关选项
                const imageSelect = document.getElementById('imageOption').parentElement;
                
                if (format === 'json' || imageOption === 'link') {
                    imageSelect.style.opacity = '0.6';
                    document.getElementById('imageOption').disabled = true;
                } else {
                    imageSelect.style.opacity = '1';
                    document.getElementById('imageOption').disabled = false;
                }
            }
            // 打开调试模态框
            openDebugModal() {
                const modal = document.getElementById('debugModal');
                modal.classList.remove('hidden');
                
                // 清空调试信息
                document.getElementById('requestInfo').textContent = '点击"发送消息"后将显示请求信息';
                document.getElementById('responseInfo').textContent = '';
                document.getElementById('errorInfo').textContent = '';
            }
            // 关闭调试模态框
            closeDebugModal() {
                const modal = document.getElementById('debugModal');
                modal.classList.add('hidden');
            }
            // 复制调试信息
            copyDebugInfo() {
                const requestInfo = document.getElementById('requestInfo').textContent;
                const responseInfo = document.getElementById('responseInfo').textContent;
                const errorInfo = document.getElementById('errorInfo').textContent;
                
                const debugText = `=== Webhook 调试信息 ===
请求信息:
${requestInfo}
响应信息:
${responseInfo}
错误详情:
${errorInfo}
=== 调试信息结束 ===`;
                
                navigator.clipboard.writeText(debugText).then(() => {
                    this.showToast('调试信息已复制到剪贴板', 'success');
                }).catch(() => {
                    this.showToast('复制失败，请手动复制', 'error');
                });
            }
            // 显示调试信息
            showDebugInfo(requestInfo, responseInfo = '', errorInfo = '') {
                document.getElementById('requestInfo').textContent = requestInfo;
                document.getElementById('responseInfo').textContent = responseInfo;
                document.getElementById('errorInfo').textContent = errorInfo;
                
                // 自动打开调试模态框
                this.openDebugModal();
            }
            // 渲染Webhook标签
            renderWebhookTabs() {
                const tabsContainer = document.getElementById('webhookTabs');
                tabsContainer.innerHTML = '';
                this.webhooks.forEach(webhook => {
                    const tab = document.createElement('div');
                    tab.className = `px-4 py-2 border border-gray-300 rounded-t-lg cursor-pointer text-sm font-medium transition-all duration-200 ${
                        this.currentWebhook === webhook.id ? 'tab-active' : 'hover:bg-gray-50'
                    }`;
                    tab.dataset.id = webhook.id;
                    tab.innerHTML = `
                        <div class="flex items-center space-x-2">
                            <span>${webhook.alias}</span>
                            <button class="text-gray-400 hover:text-danger transition-colors" onclick="webhookSender.deleteWebhook('${webhook.id}', event)">
                                <i class="fa fa-times text-xs"></i>
                            </button>
                        </div>
                    `;
                    
                    tab.addEventListener('click', () => this.selectWebhook(webhook.id));
                    tabsContainer.appendChild(tab);
                });
            }
            // 选择Webhook
            selectWebhook(id) {
                this.currentWebhook = id;
                document.getElementById('messageArea').classList.remove('hidden');
                document.getElementById('emptyState').classList.add('hidden');
                this.renderWebhookTabs();
            }
            // 打开添加Webhook模态框
            openModal() {
                const modal = document.getElementById('addWebhookModal');
                const modalContent = document.getElementById('modalContent');
                
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                }, 10);
                
                // 清空表单
                document.getElementById('webhookForm').reset();
            }
            // 关闭添加Webhook模态框
            closeModal() {
                const modal = document.getElementById('addWebhookModal');
                const modalContent = document.getElementById('modalContent');
                
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
            // 保存Webhook
            saveWebhook(e) {
                e.preventDefault();
                
                const alias = document.getElementById('webhookAlias').value.trim();
                const url = document.getElementById('webhookUrl').value.trim();
                
                if (!alias || !url) return;
                
                const newWebhook = {
                    id: Date.now().toString(),
                    alias,
                    url
                };
                
                this.webhooks.push(newWebhook);
                localStorage.setItem('webhooks', JSON.stringify(this.webhooks));
                
                this.closeModal();
                this.selectWebhook(newWebhook.id);
                this.renderWebhookTabs();
                this.checkEmptyState();
            }
            // 删除Webhook
            deleteWebhook(id, event) {
                event.stopPropagation();
                
                if (confirm('确定要删除这个Webhook吗？')) {
                    this.webhooks = this.webhooks.filter(webhook => webhook.id !== id);
                    localStorage.setItem('webhooks', JSON.stringify(this.webhooks));
                    
                    if (this.currentWebhook === id) {
                        this.currentWebhook = null;
                        document.getElementById('messageArea').classList.add('hidden');
                    }
                    
                    this.renderWebhookTabs();
                    this.checkEmptyState();
                }
            }
            // 检查空状态
            checkEmptyState() {
                if (this.webhooks.length === 0) {
                    document.getElementById('messageArea').classList.add('hidden');
                    document.getElementById('emptyState').classList.remove('hidden');
                }
            }
            // 更新字符计数
            updateCharCount() {
                const input = document.getElementById('messageInput');
                const charCount = document.getElementById('charCount');
                const maxLength = 2000;
                
                const count = input.value.length;
                charCount.textContent = count;
                
                if (count > maxLength) {
                    charCount.classList.add('text-danger');
                    input.value = input.value.substring(0, maxLength);
                    charCount.textContent = maxLength;
                } else {
                    charCount.classList.remove('text-danger');
                }
            }
            // 处理粘贴
            handlePaste(e) {
                try {
                    const clipboardData = e.clipboardData || e.originalEvent?.clipboardData;
                    if (!clipboardData) return;
                    
                    const items = clipboardData.items;
                    if (!items || items.length === 0) return;
                    
                    for (const item of items) {
                        if (item.kind === 'file' && item.type.startsWith('image/')) {
                            const file = item.getAsFile();
                            if (file) {
                                // 检查文件大小，超过5MB的图片进行压缩
                                if (file.size > 5 * 1024 * 1024) {
                                    this.compressImage(file).then(compressedFile => {
                                        this.addAttachment(compressedFile);
                                        this.showToast('图片已压缩后添加', 'success');
                                    }).catch(error => {
                                        console.error('图片压缩失败:', error);
                                        this.addAttachment(file);
                                        this.showToast('图片添加成功（未压缩）', 'success');
                                    });
                                } else {
                                    this.addAttachment(file);
                                    this.showToast('图片添加成功', 'success');
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.error('粘贴处理失败:', error);
                    this.showToast('粘贴图片失败，请尝试手动添加', 'error');
                }
            }
            // 图片压缩功能
            compressImage(file, quality = 0.8, maxWidth = 1920, maxHeight = 1080) {
                return new Promise((resolve, reject) => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2');
                    const img = new Image();
                    
                    img.onload = function() {
                        // 计算压缩后的尺寸
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        // 绘制压缩后的图片
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // 转换为Blob
                        canvas.toBlob(function(blob) {
                            if (!blob) {
                                reject(new Error('图片压缩失败'));
                                return;
                            }
                            
                            // 创建新的File对象
                            const compressedFile = new File([blob], file.name, {
                                type: file.type,
                                lastModified: Date.now()
                            });
                            
                            resolve(compressedFile);
                        }, file.type, quality);
                    };
                    
                    img.onerror = function() {
                        reject(new Error('图片加载失败'));
                    };
                    
                    img.src = URL.createObjectURL(file);
                });
            }
            // 处理文件选择
            handleFileSelect(e) {
                const files = e.target.files;
                if (files.length > 0) {
                    const file = files[0];
                    
                    // 检查文件大小，超过5MB的图片进行压缩
                    if (file.size > 5 * 1024 * 1024) {
                        this.compressImage(file).then(compressedFile => {
                            this.addAttachment(compressedFile);
                            this.showToast('图片已压缩后添加', 'success');
                        }).catch(error => {
                            console.error('图片压缩失败:', error);
                            this.addAttachment(file);
                            this.showToast('图片添加成功（未压缩）', 'success');
                        });
                    } else {
                        this.addAttachment(file);
                        this.showToast('图片添加成功', 'success');
                    }
                    
                    e.target.value = ''; // 重置input，以便可以选择相同的文件
                }
            }
            // 处理拖拽悬停
            handleDragOver(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const messageArea = document.getElementById('messageArea');
                messageArea.classList.add('border-2', 'border-primary/50', 'bg-primary/5');
                
                // 显示拖拽提示
                let dragHint = document.getElementById('dragHint');
                if (!dragHint) {
                    dragHint = document.createElement('div');
                    dragHint.id = 'dragHint';
                    dragHint.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
                    dragHint.innerHTML = `
                        <div class="bg-white rounded-xl p-8 text-center shadow-2xl">
                            <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mx-auto mb-4">
                                <i class="fa fa-cloud-upload text-primary text-2xl"></i>
                            </div>
                            <h3 class="text-xl font-semibold text-gray-800 mb-2">拖拽图片到这里</h3>
                            <p class="text-gray-500">支持JPG、PNG等图片格式</p>
                        </div>
                    `;
                    document.body.appendChild(dragHint);
                }
            }
            // 处理拖拽离开
            handleDragLeave() {
                const messageArea = document.getElementById('messageArea');
                messageArea.classList.remove('border-2', 'border-primary/50', 'bg-primary/5');
                
                // 移除拖拽提示
                const dragHint = document.getElementById('dragHint');
                if (dragHint) {
                    dragHint.remove();
                }
            }
            // 处理拖拽放下
            handleDrop(e) {
                e.preventDefault();
                e.stopPropagation();
                
                this.handleDragLeave();
                
                const files = e.dataTransfer.files;
                let addedCount = 0;
                
                for (const file of files) {
                    if (file.type.startsWith('image/')) {
                        addedCount++;
                        
                        // 检查文件大小，超过5MB的图片进行压缩
                        if (file.size > 5 * 1024 * 1024) {
                            this.compressImage(file).then(compressedFile => {
                                this.addAttachment(compressedFile);
                            }).catch(error => {
                                console.error('图片压缩失败:', error);
                                this.addAttachment(file);
                            });
                        } else {
                            this.addAttachment(file);
                        }
                    }
                }
                
                if (addedCount > 0) {
                    this.showToast(`成功添加 ${addedCount} 张图片`, 'success');
                }
            }
            // 添加附件
            addAttachment(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const attachment = {
                        id: Date.now().toString(),
                        url: e.target.result,
                        name: file.name,
                        size: file.size,
                        file: file
                    };
                    
                    this.attachments.push(attachment);
                    this.renderAttachments();
                    this.updateAttachmentStats();
                };
                reader.readAsDataURL(file);
            }
            // 渲染附件
            renderAttachments() {
                const container = document.getElementById('attachmentsContainer');
                container.innerHTML = '';
                
                this.attachments.forEach(attachment => {
                    const item = document.createElement('div');
                    item.className = 'attachment-item relative';
                    
                    const img = document.createElement('img');
                    img.src = attachment.url;
                    img.alt = attachment.name;
                    img.className = 'attachment-preview';
                    img.onerror = function() {
                        this.style.backgroundColor = '#f3f4f6';
                        this.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iNDAiIGN5PSI0MCIgcj0iNDAiIGZpbGw9IiNmM2Y0ZjYiLz4KPHRleHQgeD0iNTAlIiB5PSI1NCUiIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIiBmb250LXNpemU9IjE0IiBmaWxsPSIjY2NjZGNkIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+Pz8/PC90ZXh0Pgo8L3N2Zz4=';
                    };
                    
                    const removeBtn = document.createElement('div');
                    removeBtn.className = 'attachment-remove';
                    removeBtn.onclick = () => this.removeAttachment(attachment.id);
                    removeBtn.innerHTML = '<i class="fa fa-times text-xs"></i>';
                    
                    item.appendChild(img);
                    item.appendChild(removeBtn);
                    container.appendChild(item);
                });
            }
            // 移除附件
            removeAttachment(id) {
                this.attachments = this.attachments.filter(att => att.id !== id);
                this.renderAttachments();
            }
            // 发送消息
            async sendMessage() {
                const message = document.getElementById('messageInput').value.trim();
                if (!message && this.attachments.length === 0) {
                    this.showToast('请输入消息内容或添加附件', 'error');
                    return;
                }
                
                if (!this.currentWebhook) {
                    this.showToast('请先选择一个Webhook', 'error');
                    return;
                }
                
                const webhook = this.webhooks.find(w => w.id === this.currentWebhook);
                if (!webhook) {
                    this.showToast('未找到选中的Webhook', 'error');
                    return;
                }
                
                // 获取发送选项
                const sendFormat = document.getElementById('sendFormat').value;
                const imageOption = document.getElementById('imageOption').value;
                const timeout = parseInt(document.getElementById('timeoutOption').value);
                
                // 显示发送状态
                const sendBtn = document.getElementById('sendBtn');
                const originalText = sendBtn.innerHTML;
                sendBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> <span>发送中...</span>';
                sendBtn.disabled = true;
                
                // 创建控制器用于超时处理
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);
                
                try {
                    let response;
                    let requestInfo = '';
                    let responseInfo = '';
                    
                    // 确定最终的发送格式
                    const finalFormat = sendFormat === 'auto' ? 
                        (this.attachments.length > 0 ? 'form' : 'json') : 
                        sendFormat;
                    
                    // 构建请求信息
                    requestInfo = `URL: ${webhook.url}
方法: POST
超时: ${timeout}ms
格式: ${finalFormat}
图片处理: ${imageOption}
消息长度: ${message.length}字符
附件数量: ${this.attachments.length}
总大小: ${(this.attachments.reduce((sum, att) => sum + att.size, 0) / 1024).toFixed(1)}KB`;
                    
                    if (finalFormat === 'json' || imageOption === 'link') {
                        // JSON格式发送
                        const data = {
                            content: message,
                            attachments: this.attachments.map(att => ({
                                name: att.name,
                                size: att.size,
                                url: imageOption === 'link' ? att.url : 'base64-encoded'
                            }))
                        };
                        
                        // 如果是链接模式，直接发送base64 URL
                        if (imageOption === 'link') {
                            data.attachments = this.attachments.map(att => ({
                                name: att.name,
                                size: att.size,
                                url: att.url
                            }));
                        }
                        
                        requestInfo += `
请求头:
  Content-Type: application/json
  Accept: application/json
请求体:
${JSON.stringify(data, null, 2)}`;
                        
                        // 发送请求
                        response = await fetch(webhook.url, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Accept': 'application/json'
                            },
                            body: JSON.stringify(data),
                            signal: controller.signal
                        });
                    } else if (finalFormat === 'urlencoded') {
                        // URL编码格式
                        const formData = new URLSearchParams();
                        formData.append('content', message);
                        
                        this.attachments.forEach((att, index) => {
                            formData.append(`attachment_${index}_name`, att.name);
                            formData.append(`attachment_${index}_size`, att.size.toString());
                        });
                        
                        requestInfo += `
请求头:
  Content-Type: application/x-www-form-urlencoded
  Accept: application/json
请求体:
${formData.toString()}`;
                        
                        // 发送请求
                        response = await fetch(webhook.url, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                                'Accept': 'application/json'
                            },
                            body: formData,
                            signal: controller.signal
                        });
                    } else {
                        // FormData格式
                        const formData = new FormData();
                        formData.append('content', message);
                        
                        // 添加附件
                        this.attachments.forEach((att, index) => {
                            formData.append(`attachment_${index}`, att.file, att.name);
                        });
                        
                        requestInfo += `
请求头:
  Content-Type: multipart/form-data
  Accept: application/json
请求体:
  content: ${message}
  附件: ${this.attachments.map(att => att.name).join(', ')}`;
                        
                        // 发送请求
                        response = await fetch(webhook.url, {
                            method: 'POST',
                            body: formData,
                            signal: controller.signal
                        });
                    }
                    
                    // 获取响应信息
                    responseInfo = `状态码: ${response.status} ${response.statusText}
响应头:
${Array.from(response.headers.entries()).map(([key, value]) => `  ${key}: ${value}`).join('\n')}
响应体:`;
                    
                    try {
                        const responseBody = await response.text();
                        responseInfo += `
${responseBody}`;
                        
                        // 尝试解析JSON
                        try {
                            const jsonBody = JSON.parse(responseBody);
                            responseInfo += `
格式化JSON:
${JSON.stringify(jsonBody, null, 2)}`;
                        } catch {}
                    } catch (error) {
                        responseInfo += `
无法读取响应体: ${error.message}`;
                    }
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    this.showToast('消息发送成功！', 'success');
                    this.clearForm();
                    
                    // 显示成功的调试信息
                    this.showDebugInfo(requestInfo, responseInfo);
                } catch (error) {
                    console.error('发送失败:', error);
                    
                    let errorInfo = error.message;
                    if (error.name === 'AbortError') {
                        errorInfo = `请求超时（${timeout}ms）`;
                    }
                    
                    this.showToast('发送失败: ' + errorInfo, 'error');
                    this.showDebugInfo(requestInfo, responseInfo, error.stack || errorInfo);
                } finally {
                    // 清理超时
                    clearTimeout(timeoutId);
                    
                    // 恢复按钮状态
                    sendBtn.innerHTML = originalText;
                    sendBtn.disabled = false;
                }
            }
            // 清空表单
            clearForm() {
                document.getElementById('messageInput').value = '';
                this.attachments = [];
                this.updateCharCount();
                this.renderAttachments();
            }
            // 打开添加预设消息模态框
            openPresetModal() {
                const modal = document.getElementById('addPresetModal');
                const modalContent = document.getElementById('presetModalContent');
                
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                }, 10);
                
                // 清空表单
                document.getElementById('presetForm').reset();
            }
            // 关闭添加预设消息模态框
            closePresetModal() {
                const modal = document.getElementById('addPresetModal');
                const modalContent = document.getElementById('presetModalContent');
                
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
            // 保存预设消息
            savePreset(e) {
                e.preventDefault();
                
                const alias = document.getElementById('presetAlias').value.trim();
                const message = document.getElementById('presetMessage').value.trim();
                
                if (!alias || !message) return;
                
                const newPreset = {
                    id: Date.now().toString(),
                    alias,
                    message
                };
                
                this.presets.push(newPreset);
                localStorage.setItem('presetMessages', JSON.stringify(this.presets));
                
                this.closePresetModal();
                this.renderPresetButtons();
                this.showToast('预设消息添加成功', 'success');
            }
            // 渲染预设消息按钮
            renderPresetButtons() {
                const container = document.getElementById('presetButtonsContainer');
                container.innerHTML = '';
                
                if (this.presets.length === 0) {
                    container.innerHTML = '<span class="text-xs text-gray-400">暂无预设消息，点击添加按钮创建</span>';
                    return;
                }
                
                this.presets.forEach(preset => {
                    const btn = document.createElement('button');
                    btn.className = 'text-xs px-2 py-1 bg-white border border-gray-200 rounded hover:border-primary hover:text-primary transition-colors btn-hover flex items-center';
                    btn.innerHTML = `
                        <span>${preset.alias}</span>
                        <span class="delete-preset ml-1 w-3.5 h-3.5 rounded-full bg-danger/70 text-white flex items-center justify-center hover:bg-danger transition-colors text-[10px]">×</span>
                    `;
                    btn.onclick = () => {
                        // 填充预设消息并直接发送
                        document.getElementById('messageInput').value = preset.message;
                        this.updateCharCount();
                        this.sendMessage();
                    };
                    // 绑定删除按钮事件
                    const deleteBtn = btn.querySelector('.delete-preset');
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (confirm(`确定要删除预设消息"${preset.alias}"吗？`)) {
                            this.presets = this.presets.filter(p => p.id !== preset.id);
                            localStorage.setItem('presetMessages', JSON.stringify(this.presets));
                            this.renderPresetButtons();
                            this.showToast('预设消息已删除', 'success');
                        }
                    };
                    container.appendChild(btn);
                });
            }
            // 显示提示消息
            showToast(message, type = 'success') {
                const toast = type === 'success' ? 
                    document.getElementById('successToast') : 
                    document.getElementById('errorToast');
                
                if (type === 'error') {
                    document.getElementById('errorMessage').textContent = message;
                } else {
                    document.getElementById('successMessage').textContent = message;
                }
                
                toast.classList.remove('translate-y-20', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
                
                setTimeout(() => {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            }
        }
        // 初始化应用
        let webhookSender;
        document.addEventListener('DOMContentLoaded', () => {
            webhookSender = new WebhookSender();
        });
    </script>
</body>
